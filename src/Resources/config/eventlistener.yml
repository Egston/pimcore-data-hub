services:

    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    Pimcore\Bundle\DataHubBundle\Service\DependencyCollector:
        shared: true

    Pimcore\Bundle\DataHubBundle\EventListener\DataChangeListener:
        tags:
            - { name: kernel.event_subscriber }

    Pimcore\Bundle\DataHubBundle\EventListener\AdminListener:
        bind:
            $config: '%pimcore_data_hub%'
        tags:
            - { name: kernel.event_listener, event: pimcore.admin.indexAction.settings, method: addIndexSettings }

    Pimcore\Bundle\DataHubBundle\EventListener\PersistentCacheInvalidationListener:
        tags:
            - { name: kernel.event_subscriber }

    Pimcore\Bundle\DataHubBundle\EventListener\PersistentCacheRefreshOnTerminateListener:
        tags:
            - { name: kernel.event_subscriber }

    Pimcore\Bundle\DataHubBundle\EventListener\InProgressLockReleaseListener:
        tags:
            - { name: kernel.event_subscriber }

    Pimcore\Bundle\DataHubBundle\EventListener\ObjectLoadListener:
        tags:
            - { name: kernel.event_subscriber }

    Pimcore\Bundle\DataHubBundle\EventListener\DependencyCollectorResetListener:
        tags:
            - { name: kernel.event_subscriber }
